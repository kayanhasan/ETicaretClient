<ng-container *ngIf="listRoles; else loading">

  <h1 mat-dialog-title 
      matBadge="{{rolesComponent?.selectedOptions?.selected?.length ?? 0}}/{{roles?.totalCount ?? 0}}" 
      matBadgeOverlap="false">
    {{data?.name}} Endpoint'ine Rol Atama
  </h1>

  <div mat-dialog-content>
    <p>İlgili sayfaya aşağıdan rolleri atayabilirsiniz.</p>
  </div>

  <mat-selection-list #rolesComponent>
    <mat-list-option *ngFor="let role of listRoles" [selected]="role.selected" [value]="role.name">
      {{role.name}}
    </mat-list-option>
  </mat-selection-list>

  <div mat-dialog-actions>
    <button mat-button (click)="close()">İptal</button>
    <button mat-button [mat-dialog-close]="data" cdkFocusInitial (click)="assignRoles(rolesComponent)">Rolleri Ata</button>
  </div>

</ng-container>

<ng-template #loading>
  <div style="display: flex; justify-content: center; padding: 30px;">
    <mat-spinner [diameter]="40"></mat-spinner>
  </div>
</ng-template>
